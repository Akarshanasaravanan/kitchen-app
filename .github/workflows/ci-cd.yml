name: Kitchen App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: ./api
        run: npm ci
      - name: Lint
        working-directory: ./api
        run: npm run lint
      - name: Test
        working-directory: ./api
        run: npm test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t kitchen-api:ci ./api --target production
      - name: Build Web UI image
        run: docker build -t kitchen-web:ci ./web-ui

  k8s-smoke:
    name: K8s Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kitchen-ci
      - name: Build and load images
        run: |
          docker build -t kitchen-api:local ./api --target production
          docker build -t kitchen-web:local ./web-ui
          kind load docker-image kitchen-api:local --name kitchen-ci
          kind load docker-image kitchen-web:local --name kitchen-ci
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml
      - name: Create secrets and configmaps
        run: |
          kubectl create configmap api-config --from-literal=PORT=3000 --namespace kitchen-app
          kubectl create configmap api-server-override --from-file=server.js=api/server.js --namespace kitchen-app
          kubectl create secret generic mongodb-secret --from-literal=mongo-root-username=admin --from-literal=mongo-root-password=Secret123! --from-literal=mongo-uri='mongodb://admin:Secret123!@mongodb-service.kitchen-app.svc.cluster.local:27017/kitchendb?authSource=admin' --namespace kitchen-app
      - name: Deploy DB
        run: |
          kubectl apply -f k8s/db/statefulset.yaml
          kubectl rollout status statefulset/mongodb -n kitchen-app --timeout=180s
      - name: Deploy API
        run: |
          kubectl apply -f k8s/api/deployment.yaml
          kubectl rollout status deployment/api-deployment -n kitchen-app --timeout=180s
      - name: Deploy Web UI
        run: |
          kubectl apply -f k8s/web-ui/deployment.yaml
          kubectl rollout status deployment/web-ui-deployment -n kitchen-app --timeout=90s
      - name: Verify services
        run: |
          kubectl get pods -n kitchen-app -o wide
          kubectl get svc -n kitchen-app
